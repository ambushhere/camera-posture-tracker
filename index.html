<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Real-time AI-powered posture tracker using your webcam. Monitor head and shoulder alignment with instant alerts — all processing stays in your browser.">
    <meta name="theme-color" content="#3b82f6">
    <title>Posture Tracker — Your Perfect Posture</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
    <link rel="stylesheet" href="styles/main.css">
    <!-- MediaPipe Pose JS -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
</head>

<body>
    <div class="app-container">
        <header>
            <h1>Posture Tracker</h1>
            <p>Track your posture in real-time</p>
        </header>

        <main>
            <div class="video-section">
                <div class="video-wrapper">
                    <video id="input-video" playsinline aria-label="Camera feed for posture tracking"></video>
                    <canvas id="output-canvas" aria-label="Pose skeleton overlay"></canvas>
                    <div id="countdown" class="hidden" aria-live="polite" role="timer">3</div>
                    <div id="status-badge" class="badge" aria-live="polite" role="status">Waiting...</div>
                </div>
            </div>

            <div class="controls-section">
                <div class="button-group">
                    <button id="btn-calibrate" class="btn btn-primary" aria-label="Calibrate posture reference">
                        <span class="icon" aria-hidden="true">🎯</span> Calibrate
                    </button>
                    <button id="btn-start" class="btn btn-success" disabled aria-label="Start posture monitoring">
                        <span class="icon" aria-hidden="true">▶️</span> Start
                    </button>
                    <button id="btn-stop" class="btn btn-danger" disabled aria-label="Pause posture monitoring">
                        <span class="icon" aria-hidden="true">⏸️</span> Pause
                    </button>
                    <button id="btn-reset" class="btn btn-secondary" aria-label="Reset calibration">
                        <span class="icon" aria-hidden="true">🔄</span> Reset
                    </button>
                    <button id="btn-toggle-skeleton" class="btn btn-info" aria-label="Toggle skeleton overlay visibility">
                        <span class="icon" aria-hidden="true">🦴</span> Hide Skeleton
                    </button>
                </div>
            </div>

            <div class="metrics-section hidden" id="metrics-panel">
                <div class="metric-card">
                    <span class="label">Head Deviation:</span>
                    <span id="metric-head" class="value">0°</span>
                </div>
                <div class="metric-card">
                    <span class="label">Shoulder Tilt:</span>
                    <span id="metric-shoulders" class="value">0°</span>
                </div>
            </div>

            <div class="settings-section">
                <h3>Sensitivity Settings</h3>
                <div class="setting-item">
                    <label for="range-head">Head Sensitivity (degrees): <span id="val-head">12</span>°</label>
                    <input type="range" id="range-head" min="5" max="30" value="12">
                </div>
                <div class="setting-item">
                    <label for="range-shoulders">Shoulder Sensitivity (degrees): <span
                            id="val-shoulders">10</span>°</label>
                    <input type="range" id="range-shoulders" min="5" max="30" value="10">
                </div>
            </div>
        </main>

        <div id="notification-container" aria-live="assertive" role="alert"></div>
    </div>

    <!-- App Logic -->
    <script src="scripts/notifications.js"></script>
    <script src="scripts/poseDetection.js"></script>
    <script src="scripts/calibration.js"></script>
    <script src="scripts/postureAnalysis.js"></script>
    <script src="scripts/app.js"></script>
</body>

</html>
